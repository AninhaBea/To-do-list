<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<header style="background: #eee; padding: 10px;">
    <a href="/">Início</a>
</header>
<body>
    <h1>Bem-vindo, {{ nome }}!</h1>
    <h2>Suas tarefas pendentes:</h2>
    <form method="post" action="/aluno">
        {% for tarefa in tarefas %}
            {% if tarefa['responsavel'] == nome%}
                <input type="checkbox" name= "tarefa" value="{{ tarefa['tarefa'] }}" {% if tarefa['situacao'] == 'concluida' %} checked {% endif %}>
                {{ tarefa['tarefa'] }}
                <div></div>
            {% endif %}
        
        {% endfor %}
        <button type="submit">Atualizar</button>
    </form>
</body>
</html>
